                    },

    <script>
        window.getOperartisTheme = function () {
            var session = sessionStorage.getItem('theme');
            if (session === 'light' || session === 'dark') return session;
            return 'system';
        };
        window.applyOperartisThemeClass = function (theme) {
            var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', dark);
            return dark;
        };
        window.persistOperartisTheme = function (theme) {
            localStorage.setItem('theme', theme);
            if (theme === 'system') sessionStorage.removeItem('theme');
            else sessionStorage.setItem('theme', theme);
        };
        (function () {
            try { window.applyOperartisThemeClass(window.getOperartisTheme()); } catch (e) { }
        })();
    </script>
    <script src="./operartis-lang.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Roboto+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Subtle Grid Animation */
        .bg-grid {
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 100%);
        }

        /* Modern Scrollbar for Main Page */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }

        /* Custom Scrollbar for Module Cards (Thinner) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 2px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        /* Reveal Animation Base Classes */
        .reveal-base {
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-hidden {
            opacity: 0;
            transform: translateY(40px);
            filter: blur(8px);
        }

        .reveal-visible {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        /* Modal / Overlay Animations */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                backdrop-filter: blur(0px);
            }

            to {
                opacity: 1;
                backdrop-filter: blur(12px);
            }
        }

        @keyframes modalContentSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-backdrop {
            animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .modal-content {
            animation: modalContentSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards opacity;
        }

        /* Matrix Connector Lines (Optional/Advanced) */
        .connector-line {
            position: absolute;
            background: rgba(148, 163, 184, 0.2);
            z-index: 0;
        }

        .dark .connector-line {
            background: rgba(51, 65, 85, 0.3);
        }

        /* Background Blob Animation */
        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* ============================================================
           OPUS LAYER — enterprise homepage system
           (inspired by Odoo / INFORM / Zentio, tuned to Operartis DS)
           ============================================================ */

        /* Cinematic hero mesh: layered gold + cyan glows over the grid */
        .opus-hero-glow {
            background-image:
                radial-gradient(60% 80% at 15% 10%, rgba(245, 158, 11, 0.11), transparent 60%),
                radial-gradient(50% 60% at 90% 0%, rgba(14, 165, 233, 0.06), transparent 55%),
                radial-gradient(70% 70% at 70% 100%, rgba(180, 83, 9, 0.06), transparent 60%);
        }

        /* Animated gold sweep for the hero headline accent */
        @keyframes opusSheen {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .opus-sheen {
            background: linear-gradient(100deg, #b45309, #f59e0b, #fde68a, #f59e0b, #b45309);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: opusSheen 6s linear infinite;
        }

        /* Editorial section eyebrow with leading rule */
        .opus-eyebrow {
            letter-spacing: 0.24em;
        }

        /* Module tile lift */
        .opus-tile {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.25s ease;
        }
        .opus-tile:hover {
            transform: translateY(-6px);
        }

        /* Sticky horizon info column on desktop — below pinned HorizonNav */
        @media (min-width: 1024px) {
            .opus-sticky-info { position: sticky; top: 3.5rem; }
        }

        .opus-scroll-target { scroll-margin-top: 3.5rem; }

        /* Marquee capability ribbon */
        @keyframes opusMarquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .opus-marquee {
            animation: opusMarquee 38s linear infinite;
        }
        .opus-marquee-wrap:hover .opus-marquee {
            animation-play-state: paused;
        }

        /* Supply chain flow diagram */
        @keyframes sc-flow-dash {
            to { stroke-dashoffset: -22; }
        }

        @keyframes sc-arrow-pulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        @keyframes sc-pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50% { transform: scale(1.06); opacity: 0.15; }
        }

        @keyframes sc-node-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.35); }
            50% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
        }

        .sc-flow-arrow {
            stroke-dasharray: 5 4;
            animation: sc-flow-dash 1.1s linear infinite;
        }

        .sc-flow-arrow-active {
            animation: sc-flow-dash 0.65s linear infinite, sc-arrow-pulse 1.8s ease-in-out infinite;
        }

        .sc-arrow-pulse {
            animation: sc-arrow-pulse 1.8s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        .sc-pulse-ring {
            animation: sc-pulse-ring 2.4s ease-in-out infinite;
        }

        .sc-node-active {
            animation: sc-node-glow 2.4s ease-in-out infinite;
        }

        .sc-flow-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-gutter: stable;
        }

        .sc-flow-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .sc-flow-scroll::-webkit-scrollbar:vertical {
            width: 0;
            display: none;
        }
    </style>

            }, [threshold]);

                <div
                    ref={ref}
                    className={`reveal-base ${isVisible ? 'reveal-visible' : 'reveal-hidden'} ${className}`}

            const steps = content.ui.sc_steps;

            const [paused, setPaused] = useState(false);
            const [connectorGeom, setConnectorGeom] = useState(null);
            const flowTrackRef = useRef(null);
            const gridRef = useRef(null);

            const measureConnectors = () => {
                const track = flowTrackRef.current;
                const grid = gridRef.current;
                if (!track || !grid) return;
                const icons = grid.querySelectorAll('[data-sc-icon]');
                if (icons.length < 2) return;
                const trackRect = track.getBoundingClientRect();
                if (!trackRect.width) return;

                const toPct = (px) => (px / trackRect.width) * 100;
                const tailClear = 4;

                const segments = [];
                for (let i = 0; i < icons.length - 1; i++) {
                    const a = icons[i].getBoundingClientRect();
                    const b = icons[i + 1].getBoundingClientRect();
                    const x1Px = (a.right - trackRect.left) + tailClear;
                    const x2Px = (b.left - trackRect.left);
                    const x1Pct = toPct(x1Px);
                    const x2Pct = toPct(x2Px);
                    segments.push({
                        x1Pct,

                const x2Pct = x1Pct + 10.6;

                                <p className="text-[10px] font-bold uppercase opus-eyebrow text-brand-gold mb-1">{content.ui.sc_eyebrow}</p>
                                <h2 className="text-sm md:text-base font-bold text-slate-800 dark:text-slate-100 tracking-tight">{content.ui.sc_title}</h2>
                            </div>
                        </div>

                        <div className="relative sc-flow-scroll -mx-1 px-1 pt-1 pb-3">
                            <div className="relative min-w-[920px] md:min-w-0" ref={flowTrackRef}>
                                <div className="absolute inset-x-0 top-[34px] md:top-[38px] h-6 pointer-events-none z-[1]" aria-hidden="true">
                                    {SC_CONNECTOR_COLORS.map((_, i) => {
                                        const { x1Pct, x2Pct } = getSegmentGeom(i);
                                        const widthPct = Math.max(x2Pct - x1Pct, 0);
                                        const isPast = i < activeIdx;
                                        const isActive = i === activeIdx;
                                        const lit = isPast || isActive;
                                        const stroke = lit ? `url(#sc-seg-grad-${i})` : 'rgba(148,163,184,0.42)';
                                        const strokeWidth = isActive ? 2.5 : isPast ? 2 : 1.75;
                                        const arrowFill = lit ? '#f59e0b' : 'rgba(148,163,184,0.5)';
                                        const arrowClass = isActive ? 'sc-flow-arrow sc-flow-arrow-active' : 'sc-flow-arrow';
                                        const lineStyle = isPast && !isActive ? { opacity: 0.75 } : undefined;

                                        return (

            const stats = useMemo(() => {
                const liveCount = Object.values(MODULE_STATIC_DATA).filter(m => m.status === 'live').length;
                const totalModules = Object.keys(MODULE_STATIC_DATA).length;
                const horizonCount = content.matrix.length;
                const blockCount = content.matrix.reduce((n, h) => n + h.blocks.length, 0);
                return [
                    { value: liveCount, label: content.ui.stat_live },
                    { value: horizonCount, label: content.ui.stat_horizons },
                    { value: blockCount, label: content.ui.stat_blocks },
                    { value: totalModules, label: content.ui.stat_engines },
                ];
            }, [content]);

            const scrollToId = useCallback((id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, []);

            const scrollToHorizon = useCallback((id) => {
                setActiveHorizon(id);
                scrollToId(`horizon-${id}`);
            }, [scrollToId]);

            const scrollToAbout = useCallback(() => {
                setActiveHorizon('about');
                scrollToId('about');
            }, [scrollToId]);

            useEffect(() => {
                const applyTheme = () => {
                    window.applyOperartisThemeClass(theme);
                    window.persistOperartisTheme(theme);
                };
                applyTheme();
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleSystemChange = () => { if (theme === 'system') applyTheme(); };
                mediaQuery.addEventListener('change', handleSystemChange);
                return () => mediaQuery.removeEventListener('change', handleSystemChange);
            }, [theme]);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                window.persistOperartisLang(lang);
            }, [lang]);

            // Scroll-spy: horizons + About (Vision & Philosophy nav pill)
            useEffect(() => {
                const horizonSections = content.matrix
                    .map(h => document.getElementById(`horizon-${h.id}`))
                    .filter(Boolean);
                const aboutSection = document.getElementById('about');

                const aboutObserver = new IntersectionObserver(([entry]) => {
                    setAboutNavVisible(entry.isIntersecting);
                }, { threshold: 0, rootMargin: '-12% 0px -40% 0px' });

                const activeObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (!entry.isIntersecting) return;
                        if (entry.target.id === 'about') {
                            setActiveHorizon('about');
                        } else {
                            setActiveHorizon(entry.target.id.replace('horizon-', ''));
                        }
                    });
                }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });

                if (aboutSection) aboutObserver.observe(aboutSection);
                horizonSections.forEach(s => activeObserver.observe(s));
                if (aboutSection) activeObserver.observe(aboutSection);

                return () => {
                    aboutObserver.disconnect();
                    activeObserver.disconnect();
                };
            }, [content]);

            const toggleTheme = () => {
                if (theme === 'system') setTheme('light');
                else if (theme === 'light') setTheme('dark');
                else setTheme('system');
            };

            const toggleLang = () => {
                setLang(prev => prev === 'vi' ? 'en' : prev === 'en' ? 'de' : 'vi');
            };

            const handleBlockClick = (block) => {
                setSelectedBlock(block);
            };

            const handleCloseModal = () => {
                setSelectedBlock(null);
            };

            return (
                <div className="h-full flex flex-col relative bg-slate-50 dark:bg-[#020617] transition-colors duration-500">
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        {/* Background effects removed for cleaner look */}
                    </div>

                    <nav className="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-brand-obsidian/50 glass-panel z-10 shrink-0">
                        <div className="max-w-7xl mx-auto w-full h-full px-4 sm:px-6 md:px-10 flex items-center justify-between">
                        <div className="flex items-center gap-3 shrink-0 p-1.5 pr-5 rounded-full border border-white/40 dark:border-white/10 bg-gradient-to-br from-white/20 to-white/5 dark:from-slate-800/30 dark:to-slate-900/10 shadow-[0_4px_16px_rgba(0,0,0,0.1),inset_0_1px_0_0_rgba(255,255,255,0.2)] backdrop-blur-md">
                            <a href="./terminal.html">
                                <img src="./icononly_transparent_nobuffer.png" className="h-8 w-8 md:h-10 md:w-10 object-contain cursor-pointer transition-transform hover:scale-110" onError={(e) => e.target.style.display = 'none'} />
                            </a>
                            <div className="flex flex-col">
                                <span className="font-bold text-base md:text-lg tracking-tight text-slate-900 dark:text-white leading-none">OPERARTIS</span>
                                <span className="text-[9px] text-slate-500 dark:text-slate-400 tracking-widest uppercase hidden hover:block xs:block">{content.ui.system_terminal}</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-1.5 md:gap-6 shrink-0">
                            <div className="flex items-center gap-1 p-1 rounded-full border border-white/40 dark:border-white/10 bg-gradient-to-br from-white/20 to-white/5 dark:from-slate-800/30 dark:to-slate-900/10 shadow-[0_4px_16px_rgba(0,0,0,0.1),inset_0_1px_0_0_rgba(255,255,255,0.2)] backdrop-blur-md">
                                <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 text-xs font-mono text-slate-500 dark:text-slate-400">
                                    <ClockIcon />
                                    <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </div>

                                <span className="hidden sm:block w-px h-4 shrink-0 self-center bg-slate-200 dark:bg-slate-700/50" aria-hidden="true" />

                                {/* Theme Toggle — default system; cycle: system → light → dark → system */}
                                <div className="flex items-center px-1">
                                    <button
                                        onClick={toggleTheme}
                                        className="p-1.5 rounded-full hover:bg-white/20 dark:hover:bg-white/5 text-slate-500 dark:text-slate-400 transition-colors"
                                        title={theme === 'light' ? 'Light mode — click for dark' : theme === 'dark' ? 'Dark mode — click for system' : 'System theme — follows OS — click for light'}
                                    >
                                        {theme === 'light' ? <SunIcon /> : theme === 'dark' ? <MoonIcon /> : <SystemIcon />}
                                    </button>
                                </div>

                                <span className="w-px h-4 shrink-0 self-center bg-slate-200 dark:bg-slate-700/50" aria-hidden="true" />

                                {/* Language Toggle */}
                                <button onClick={toggleLang} className="p-1.5 rounded-full hover:bg-white/20 dark:hover:bg-white/5 text-slate-500 dark:text-slate-400 transition-colors flex items-center gap-1 font-mono text-xs font-bold px-2">
                                    <GlobeIcon />
                                    <span>{lang.toUpperCase()}</span>
                                </button>
                            </div>

                            <div className="h-8 w-8 rounded-full bg-gradient-to-tr from-brand-gold to-brand-dark flex items-center justify-center text-white shadow-md cursor-pointer">
                                <UserIcon />
                            </div>
                        </div>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-y-auto overflow-x-hidden z-10 w-full flex flex-col">
                        <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 md:px-10 py-8 md:py-12 flex flex-col flex-1">
                            <Reveal>
                                <HeroSection content={content} stats={stats} onExplore={() => scrollToId('platform')} onWhy={() => scrollToId('about')} />
                            </Reveal>

                            <div className="mt-10 md:mt-14">
                                <CapabilityRibbon content={content} />
                            </div>

                            <div className="mt-14 md:mt-20">
                                <Reveal><MetricsBand content={content} stats={stats} /></Reveal>
                            </div>

                            <div className="mt-16 md:mt-20">
                                <Reveal delay={125}><SupplyChainFlow content={content} /></Reveal>
                            </div>

                            <div className="mt-16 md:mt-24">
                                <Reveal><JourneyStrip content={content} horizons={content.matrix} onNav={scrollToHorizon} /></Reveal>
                            </div>

                            <div id="platform" className="opus-scroll-target mt-16 md:mt-24">
                                <Reveal>
                                    <div className="mb-8">
                                        <p className="text-[10px] font-bold uppercase opus-eyebrow text-brand-gold mb-2">{content.ui.platform_eyebrow}</p>
                                        <h2 className="text-2xl md:text-4xl font-bold text-slate-900 dark:text-white tracking-tight">{content.ui.platform_title}</h2>
                                    </div>
                                </Reveal>
                            </div>

                            <HorizonNav
                                horizons={content.matrix}
                                activeId={activeHorizon}
                                onNav={scrollToHorizon}
                                onAboutNav={scrollToAbout}
                                aboutVisible={aboutNavVisible}
                                content={content}
                            />

                            <div>
                                {content.matrix.map((horizon, index) => (
                                    <HorizonSection
                                        key={horizon.id}
                                        horizon={horizon}
                                        content={content}
                                        onBlockClick={handleBlockClick}
                                        index={index}
                                    />
                                ))}
                            </div>

                            <AboutSection content={content} />
                        </div>
                    </main>

                    <footer className="py-4 border-t border-slate-200 dark:border-slate-800 z-10 shrink-0 bg-white/30 dark:bg-brand-obsidian/30 glass-panel">
                        <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 md:px-10 flex flex-col md:flex-row justify-between items-center gap-2">
                            <p className="text-[10px] text-slate-400">© {new Date().getFullYear()} Operartis Analytics. All rights reserved.</p>
                            <div className="flex items-center gap-4 text-[10px] text-slate-500 font-mono">
                                <span>{content.ui.rights_reserved}</span>
                            </div>
                        </div>
                    </footer>

                    <ModuleModal
                        block={selectedBlock}
                        content={content}
                        isOpen={!!selectedBlock}
                        onClose={handleCloseModal}
                    />
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
