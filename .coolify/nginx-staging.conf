server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html;
    index index.html index.htm;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api-staging.operartis.io https://api.operartis.io; worker-src 'self' blob:; child-src 'self' blob:;" always;

    location = /terminal.html {
        return 301 /;
    }

    location ~* ^/(?:\.|COOLIFY_DEPLOYMENT\.md|DESIGN_SYSTEM\.md|ABC-XYZ-Generator\.py|.*nginx.*\.conf$) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
