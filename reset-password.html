<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operartis | Reset Password</title>
    <link rel="icon" type="image/png" href="./icononly_transparent_quadratic.png">
    <script src="./operartis-api.js?v=20260621-auth-sync-tab"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 18% 18%, rgba(245, 158, 11, .12), transparent 32%),
                radial-gradient(circle at 82% 12%, rgba(14, 165, 233, .10), transparent 30%),
                #020617;
            color: #f8fafc;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }
        main {
            width: min(460px, 100%);
            border: 1px solid rgba(148, 163, 184, .28);
            border-radius: 10px;
            background: rgba(15, 23, 42, .96);
            padding: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .42);
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0 0 22px; color: #94a3b8; line-height: 1.5; }
        label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #cbd5e1; }
        input { height: 44px; border-radius: 8px; border: 1px solid rgba(148, 163, 184, .32); background: #020617; color: #f8fafc; padding: 0 12px; font-size: 14px; outline: none; }
        input:focus { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, .18); }
        button { height: 44px; width: 100%; border: 0; border-radius: 8px; background: #f59e0b; color: #fff; font-weight: 900; cursor: pointer; }
        button:disabled { opacity: .68; cursor: not-allowed; }
        a { color: #fbbf24; font-weight: 800; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .message { display: none; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-weight: 800; line-height: 1.4; margin-bottom: 14px; }
        .error { color: #fecaca; background: rgba(239, 68, 68, .14); border: 1px solid rgba(248, 113, 113, .35); }
        .success { color: #bbf7d0; background: rgba(34, 197, 94, .14); border: 1px solid rgba(74, 222, 128, .35); }
        .password-wrap { position: relative; display: flex; align-items: center; }
        .password-wrap input { width: 100%; padding-right: 46px; }
        .toggle {
            position: absolute;
            right: 7px;
            top: 0;
            bottom: 0;
            height: 32px;
            width: 32px;
            margin: auto 0;
            transform: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            padding: 0;
        }
        .toggle:active { transform: none; }
        .toggle:hover { background: rgba(148, 163, 184, .16); color: #f8fafc; }
        .toggle svg { display: block; flex-shrink: 0; width: 18px; height: 18px; stroke: currentColor; }
        .footer-link { margin: 16px 0 0; text-align: center; font-size: 13px; }
    </style>
</head>

<body>
    <main>
        <h1>Reset Operartis Password</h1>
        <p>Enter a new password for your invited Operartis account.</p>
        <div id="message" class="message"></div>
        <form id="reset-form">
            <label>Email<input id="email" type="email" autocomplete="email" required></label>
            <label>New Password
                <span class="password-wrap">
                    <input id="password" type="password" autocomplete="new-password" minlength="8" required>
                    <button class="toggle" type="button" data-target="password" aria-label="Show password"></button>
                </span>
            </label>
            <label>Confirm New Password
                <span class="password-wrap">
                    <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
                    <button class="toggle" type="button" data-target="confirm-password" aria-label="Show password"></button>
                </span>
            </label>
            <button id="submit" type="submit">Reset Password</button>
        </form>
        <p class="footer-link"><a href="./dashboard.html">Back to sign in</a></p>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const emailParam = params.get('email') || '';
        const form = document.getElementById('reset-form');
        const message = document.getElementById('message');
        const submit = document.getElementById('submit');
        const emailInput = document.getElementById('email');
        emailInput.value = emailParam;

        function eyeIcon(visible) {
            if (visible) {
                return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C7 20 2.73 16.89 1 12a18.15 18.15 0 0 1 5.06-7.94"/><path d="M9.9 4.24A10.86 10.86 0 0 1 12 4c5 0 9.27 3.11 11 8a18.2 18.2 0 0 1-3.22 5.02"/><path d="M14.12 14.12a3 3 0 0 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>';
            }
            return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.06 12.35a11.13 11.13 0 0 1 19.88 0"/><path d="M21.94 11.65a11.13 11.13 0 0 1-19.88 0"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }

        document.querySelectorAll('.toggle').forEach(button => {
            button.innerHTML = eyeIcon(false);
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.target);
                const visible = input.type === 'password';
                input.type = visible ? 'text' : 'password';
                button.innerHTML = eyeIcon(visible);
                button.setAttribute('aria-label', visible ? 'Hide password' : 'Show password');
                input.focus();
            });
        });

        if (!token) {
            showMessage('Reset link is missing or incomplete.', 'error');
            submit.disabled = true;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (password !== confirmPassword) {
                showMessage('New password and confirmation do not match.', 'error');
                return;
            }
            submit.disabled = true;
            submit.textContent = 'Resetting...';
            try {
                const data = await window.OperartisApi.confirmPasswordReset(emailInput.value, token, password);
                showMessage(data.message || 'Password has been reset. Please sign in with the new password.', 'success');
                form.reset();
                window.setTimeout(() => { window.location.href = './dashboard.html'; }, 1200);
            } catch (error) {
                showMessage(error.message || 'Password could not be reset.', 'error');
            } finally {
                submit.disabled = false;
                submit.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
