<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operartis | Reset Password</title>
    <link rel="icon" type="image/png" href="./icononly_transparent_quadratic.png">
    <script src="./operartis-theme.js?v=20260624-theme-sync"></script>
    <script src="./operartis-lang.js?v=20260627-lang-sync"></script>
    <script src="./operartis-api.js?v=20260628-reset-validate"></script>
    <style>
        :root {
            --reset-bg: #f8fafc;
            --reset-page-bg:
                linear-gradient(rgba(148, 163, 184, .06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, .06) 1px, transparent 1px),
                radial-gradient(circle at 10% 8%, rgba(245, 158, 11, .08), transparent 28rem),
                radial-gradient(circle at 88% 2%, rgba(56, 189, 248, .06), transparent 30rem),
                radial-gradient(circle at 50% 100%, rgba(226, 232, 240, .9), transparent 50%),
                var(--reset-bg);
            --reset-card-bg: linear-gradient(180deg, rgba(255, 255, 255, .98), rgba(248, 250, 252, .95));
            --reset-text: #0f172a;
            --reset-muted: #64748b;
            --reset-label: #334155;
            --reset-border: rgba(245, 158, 11, .22);
            --reset-input-bg: rgba(255, 255, 255, .98);
            --reset-input-text: #0f172a;
            --reset-input-border: rgba(148, 163, 184, .35);
            --reset-close-bg: rgba(15, 23, 42, .08);
            --reset-close-text: #475569;
            --reset-close-hover-bg: rgba(15, 23, 42, .14);
            --reset-close-hover-text: #0f172a;
            --reset-error-text: #991b1b;
            --reset-error-bg: rgba(254, 226, 226, .92);
            --reset-error-border: rgba(248, 113, 113, .48);
            --reset-success-text: #166534;
            --reset-success-bg: rgba(220, 252, 231, .95);
            --reset-success-border: rgba(34, 197, 94, .35);
            --reset-gold: #f59e0b;
            --reset-gold-2: #fbbf24;
            --reset-radius: 10px;
            --reset-radius-lg: 14px;
            --reset-shadow: 0 24px 80px rgba(15, 23, 42, .18);
        }

        :root.dark {
            --reset-bg: #020617;
            --reset-page-bg:
                linear-gradient(rgba(148, 163, 184, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, .04) 1px, transparent 1px),
                radial-gradient(circle at 10% 8%, rgba(245, 158, 11, .12), transparent 28rem),
                radial-gradient(circle at 88% 2%, rgba(56, 189, 248, .1), transparent 30rem),
                radial-gradient(circle at 50% 100%, rgba(15, 23, 42, .8), transparent 50%),
                var(--reset-bg);
            --reset-card-bg: linear-gradient(180deg, rgba(15, 23, 42, .94), rgba(15, 23, 42, .82));
            --reset-text: #f8fafc;
            --reset-muted: #94a3b8;
            --reset-label: #cbd5e1;
            --reset-border: rgba(245, 158, 11, .22);
            --reset-input-bg: rgba(2, 6, 23, .72);
            --reset-input-text: #f8fafc;
            --reset-input-border: rgba(148, 163, 184, .22);
            --reset-close-bg: rgba(148, 163, 184, .16);
            --reset-close-text: #cbd5e1;
            --reset-close-hover-bg: rgba(148, 163, 184, .28);
            --reset-close-hover-text: #f8fafc;
            --reset-error-text: #fecaca;
            --reset-error-bg: rgba(239, 68, 68, .14);
            --reset-error-border: rgba(248, 113, 113, .35);
            --reset-success-text: #bbf7d0;
            --reset-success-bg: rgba(34, 197, 94, .14);
            --reset-success-border: rgba(74, 222, 128, .35);
            --reset-shadow: 0 24px 80px rgba(0, 0, 0, .32);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--reset-page-bg);
            background-size: 72px 72px, 72px 72px, auto, auto, auto, auto;
            background-attachment: fixed;
            color: var(--reset-text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 24px;
            transition: background .2s ease, color .2s ease;
        }

        main {
            position: relative;
            width: min(460px, 100%);
            border: 1px solid var(--reset-border);
            border-radius: var(--reset-radius-lg);
            background: var(--reset-card-bg);
            padding: 28px 26px;
            box-shadow: var(--reset-shadow);
            overflow: hidden;
            margin: 0;
        }

        main::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--reset-gold), var(--reset-gold-2), var(--reset-gold));
            pointer-events: none;
        }

        h1 {
            margin: 0 34px 6px 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em;
            line-height: 1.15;
        }

        p {
            margin: 0 0 22px;
            color: var(--reset-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 14px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--reset-label);
        }

        input {
            height: 42px;
            width: 100%;
            border-radius: var(--reset-radius);
            border: 1px solid var(--reset-input-border);
            background: var(--reset-input-bg);
            color: var(--reset-input-text);
            padding: 0 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 400;
            line-height: normal;
            outline: none;
            transition: border-color .2s cubic-bezier(.4, 0, .2, 1), box-shadow .2s cubic-bezier(.4, 0, .2, 1);
        }

        input:focus {
            border-color: rgba(245, 158, 11, .7);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, .12);
        }

        button {
            height: 42px;
            width: 100%;
            border: 0;
            border-radius: var(--reset-radius);
            background: var(--reset-gold);
            color: #fff;
            font: inherit;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: filter .2s cubic-bezier(.4, 0, .2, 1), transform .15s cubic-bezier(.4, 0, .2, 1);
        }

        button:hover:not(:disabled) { filter: brightness(1.06); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { cursor: not-allowed; opacity: .68; }

        .message {
            display: none;
            border-radius: var(--reset-radius);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 14px;
        }

        .error {
            color: var(--reset-error-text);
            background: var(--reset-error-bg);
            border: 1px solid var(--reset-error-border);
        }

        .success {
            color: var(--reset-success-text);
            background: var(--reset-success-bg);
            border: 1px solid var(--reset-success-border);
        }

        .info {
            color: var(--reset-label);
            background: rgba(148, 163, 184, .12);
            border: 1px solid rgba(148, 163, 184, .24);
        }

        .hidden {
            display: none !important;
        }

        .invalid-link-action {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            width: 100%;
            border-radius: var(--reset-radius);
            border: 1px solid var(--reset-input-border);
            background: transparent;
            color: var(--reset-label);
            font-size: 13px;
            font-weight: 800;
            text-decoration: none;
            transition: border-color .2s ease, color .2s ease, background .2s ease;
        }

        .invalid-link-action:hover {
            border-color: rgba(245, 158, 11, .5);
            color: var(--reset-gold);
            background: rgba(245, 158, 11, .08);
            text-decoration: none;
        }

        .reset-close {
            position: absolute;
            right: 12px;
            top: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 0;
            border-radius: 999px;
            background: var(--reset-close-bg);
            color: var(--reset-close-text);
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            z-index: 1;
            text-decoration: none;
        }

        .reset-close:hover {
            background: var(--reset-close-hover-bg);
            color: var(--reset-close-hover-text);
            text-decoration: none;
        }

        .password-wrap {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-wrap input { padding-right: 46px; }

        .password-toggle {
            position: absolute;
            right: 7px;
            top: 0;
            bottom: 0;
            height: 32px;
            margin: auto 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--reset-muted);
            cursor: pointer;
            padding: 0;
            transform: none;
        }

        .password-toggle:hover {
            background: var(--reset-close-bg);
            color: var(--reset-text);
            filter: none;
        }

        .password-toggle svg {
            display: block;
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .footer-link {
            margin: 16px 0 0;
            text-align: center;
            font-size: 13px;
        }

        .footer-link a {
            color: var(--reset-gold-2);
            font-weight: 800;
            text-decoration: none;
        }

        .footer-link a:hover { text-decoration: underline; }

        @media (max-width: 520px) {
            body { padding: 18px; }
            main { padding: 26px 22px; }
            h1 { font-size: 21px; }
        }
    </style>
</head>

<body>
    <main>
        <a class="reset-close" href="./dashboard.html" aria-label="Back to sign in" data-i18n-aria="back_aria">&times;</a>
        <h1 data-i18n="title">Reset Operartis Password</h1>
        <p data-i18n="subtitle">Enter a new password for your Operartis account.</p>
        <div id="message" class="message"></div>
        <form id="reset-form">
            <div id="reset-fields">
                <label><span data-i18n="email">Email</span><input id="email" type="email" autocomplete="email" required></label>
                <label><span data-i18n="new_password">New Password</span>
                    <span class="password-wrap">
                        <input id="password" type="password" autocomplete="new-password" minlength="8" required>
                        <button class="password-toggle" type="button" data-target="password" aria-label="Show password" aria-pressed="false" data-i18n-aria="show_password"></button>
                    </span>
                </label>
                <label><span data-i18n="confirm_password">Confirm New Password</span>
                    <span class="password-wrap">
                        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
                        <button class="password-toggle" type="button" data-target="confirm-password" aria-label="Show password" aria-pressed="false" data-i18n-aria="show_password"></button>
                    </span>
                </label>
                <button id="submit" type="submit" data-i18n="submit">Reset Password</button>
            </div>
            <a id="reset-invalid-home" class="invalid-link-action hidden" href="./index.html" data-i18n="back_home">Back to Operartis</a>
        </form>
        <p id="reset-footer" class="footer-link"><a href="./dashboard.html" data-i18n="back">Back to sign in</a></p>
    </main>
    <script>
        const RESET_COPY = {
            en: {
                page_title: 'Operartis | Reset Password',
                title: 'Reset Operartis Password',
                subtitle: 'Enter a new password for your Operartis account.',
                email: 'Email',
                new_password: 'New Password',
                confirm_password: 'Confirm New Password',
                submit: 'Reset Password',
                resetting: 'Resetting...',
                back: 'Back to sign in',
                back_home: 'Back to Operartis',
                back_aria: 'Back to sign in',
                show_password: 'Show password',
                hide_password: 'Hide password',
                validating: 'Checking reset link...',
                invalid_link: 'This reset link is no longer valid. Please request a new password reset link.',
                missing_token: 'This reset link is no longer valid. Please request a new password reset link.',
                mismatch: 'New password and confirmation do not match.',
                success: 'Password has been reset. Please sign in with the new password.',
                failed: 'Password could not be reset.'
            },
            vi: {
                page_title: 'Operartis | Dat lai mat khau',
                title: 'Đặt Lại Mật Khẩu Operartis',
                subtitle: 'Nhập mật khẩu mới cho tài khoản Operartis của bạn.',
                email: 'Email',
                new_password: 'Mật Khẩu Mới',
                confirm_password: 'Xác Nhận Mật Khẩu Mới',
                submit: 'Đặt Lại Mật Khẩu',
                resetting: 'Đang đặt lại...',
                back: 'Quay lại đăng nhập',
                back_home: 'Quay lại Operartis',
                back_aria: 'Quay lại đăng nhập',
                show_password: 'Hiển thị mật khẩu',
                hide_password: 'Ẩn mật khẩu',
                validating: 'Đang kiểm tra liên kết đặt lại...',
                invalid_link: 'Liên kết đặt lại mật khẩu không còn hợp lệ. Vui lòng yêu cầu liên kết đặt lại mới.',
                missing_token: 'Liên kết đặt lại mật khẩu không còn hợp lệ. Vui lòng yêu cầu liên kết đặt lại mới.',
                mismatch: 'Mật khẩu mới và xác nhận mật khẩu không khớp.',
                success: 'Mật khẩu đã được đặt lại. Vui lòng đăng nhập bằng mật khẩu mới.',
                failed: 'Không thể đặt lại mật khẩu.'
            }
        };

        function getResetLang() {
            if (window.getOperartisLang) {
                const lang = window.getOperartisLang();
                return RESET_COPY[lang] ? lang : 'en';
            }
            const languages = Array.isArray(navigator.languages) ? navigator.languages : [navigator.language || 'en'];
            return languages.some(code => String(code || '').toLowerCase().split('-')[0] === 'vi') ? 'vi' : 'en';
        }

        let resetLang = getResetLang();
        let resetCopy = RESET_COPY[resetLang] || RESET_COPY.en;

        function t(key) {
            return resetCopy[key] || RESET_COPY.en[key] || key;
        }

        function applyResetLanguage() {
            resetLang = getResetLang();
            resetCopy = RESET_COPY[resetLang] || RESET_COPY.en;
            document.documentElement.lang = resetLang;
            document.title = t('page_title');
            document.querySelectorAll('[data-i18n]').forEach(element => {
                element.textContent = t(element.dataset.i18n);
            });
            document.querySelectorAll('[data-i18n-aria]').forEach(element => {
                element.setAttribute('aria-label', t(element.dataset.i18nAria));
            });
            document.querySelectorAll('.password-toggle').forEach(button => {
                const input = document.getElementById(button.dataset.target);
                const visible = input && input.type === 'text';
                button.setAttribute('aria-label', t(visible ? 'hide_password' : 'show_password'));
            });
            if (resetLinkInvalid) {
                showMessage(t('invalid_link'), 'error');
            } else if (resetLinkValidating) {
                showMessage(t('validating'), 'info');
            }
        }

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const emailParam = params.get('email') || '';
        const form = document.getElementById('reset-form');
        const message = document.getElementById('message');
        const submit = document.getElementById('submit');
        const resetFields = document.getElementById('reset-fields');
        const invalidHome = document.getElementById('reset-invalid-home');
        const resetFooter = document.getElementById('reset-footer');
        const emailInput = document.getElementById('email');
        emailInput.value = emailParam;
        let resetLinkInvalid = false;
        let resetLinkValidating = false;

        function eyeIcon(visible) {
            if (visible) {
                return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C7 20 2.73 16.89 1 12a18.15 18.15 0 0 1 5.06-7.94"/><path d="M9.9 4.24A10.86 10.86 0 0 1 12 4c5 0 9.27 3.11 11 8a18.2 18.2 0 0 1-3.22 5.02"/><path d="M14.12 14.12a3 3 0 0 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>';
            }
            return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.06 12.35a11.13 11.13 0 0 1 19.88 0"/><path d="M21.94 11.65a11.13 11.13 0 0 1-19.88 0"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }

        function showInvalidResetLink() {
            resetLinkInvalid = true;
            resetLinkValidating = false;
            resetFields.classList.add('hidden');
            invalidHome.classList.remove('hidden');
            resetFooter.classList.add('hidden');
            submit.disabled = true;
            showMessage(t('invalid_link'), 'error');
        }

        async function validateResetLink() {
            if (!token || !emailInput.value.trim()) {
                showInvalidResetLink();
                return;
            }
            resetLinkInvalid = false;
            resetLinkValidating = true;
            resetFields.classList.add('hidden');
            invalidHome.classList.add('hidden');
            resetFooter.classList.add('hidden');
            submit.disabled = true;
            showMessage(t('validating'), 'info');
            try {
                const data = await window.OperartisApi.validatePasswordReset(emailInput.value, token);
                emailInput.value = data.email || emailInput.value;
                resetLinkValidating = false;
                message.style.display = 'none';
                resetFields.classList.remove('hidden');
                submit.disabled = false;
                resetFooter.classList.remove('hidden');
            } catch (error) {
                showInvalidResetLink();
            }
        }

        document.querySelectorAll('.password-toggle').forEach(button => {
            button.innerHTML = eyeIcon(false);
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.target);
                const visible = input.type === 'password';
                input.type = visible ? 'text' : 'password';
                button.innerHTML = eyeIcon(visible);
                button.setAttribute('aria-label', t(visible ? 'hide_password' : 'show_password'));
                button.setAttribute('aria-pressed', String(visible));
                input.focus();
            });
        });

        applyResetLanguage();

        window.addEventListener('operartis:lang-change', applyResetLanguage);
        window.addEventListener('storage', event => {
            if (event.key === 'lang' || event.key === 'preferredLang' || event.key === 'inv-lang') {
                applyResetLanguage();
            }
        });

        validateResetLink();

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (resetLinkInvalid) return;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (password !== confirmPassword) {
                showMessage(t('mismatch'), 'error');
                return;
            }
            submit.disabled = true;
            submit.textContent = t('resetting');
            try {
                const data = await window.OperartisApi.confirmPasswordReset(emailInput.value, token, password);
                showMessage(data.message || t('success'), 'success');
                form.reset();
                window.setTimeout(() => { window.location.href = './dashboard.html'; }, 1200);
            } catch (error) {
                showInvalidResetLink();
            } finally {
                if (!resetLinkInvalid) submit.disabled = false;
                submit.textContent = t('submit');
            }
        });
    </script>
</body>

</html>
