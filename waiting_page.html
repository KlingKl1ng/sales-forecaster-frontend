    <script>
        tailwind.config = {

            theme: {

                            gold: '#f59e0b',
                            dark: '#b45309',
                            gray: '#f8fafc',
                            border: '#e2e8f0',
                            obsidian: '#0f172a',
                            slate: '#1e293b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    fontSize: {
                        xxs: '0.65rem'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.25s ease-out',
                        'slide-up': 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4,0,0.6,1) infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },

                    }

    <script>
        window.getOperartisTheme = function () {
            var session = sessionStorage.getItem('theme');
            if (session === 'light' || session === 'dark') return session;
            return localStorage.getItem('theme') || 'system';
        };
        window.applyOperartisThemeClass = function (theme) {
            var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', dark);
            return dark;
        };
        window.persistOperartisTheme = function (theme) {
            localStorage.setItem('theme', theme);
            if (theme === 'system') sessionStorage.removeItem('theme');
            else sessionStorage.setItem('theme', theme);
        };
        (function () {
            try { window.applyOperartisThemeClass(window.getOperartisTheme()); } catch (e) { }
        })();
    </script>

    <style>

        }

            12% { opacity: 0.9; }
            55% { opacity: 0.9; }
            100% { transform: translateX(110%); opacity: 0; }
        }

        .scan-line::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.18), transparent);
            transform: translateX(-110%);

        }

        @keyframes lineFlow {

        }

            animation: lineFlow 1.1s linear infinite;
        }

                transform: translateY(0);

        .hero-domain-pill {

            isolation: isolate;
            overflow: hidden;
            border-color: rgba(245, 158, 11, 0.58) !important;
            background:

                inset 0 1px 0 rgba(255, 255, 255, 0.32) !important;

        }

        }

        }

        .dark .hero-domain-slogan {
            color: #fde68a;
        }

        .surface-border::before {

            animation-name: welcomeRunnerFrame1;

            animation-name: welcomeRunnerFrame2;
        }

            animation-name: welcomeRunnerFrame3;

            animation-delay: var(--runner-phase, 0s);

            opacity: 0.72;

        function CanvasBackground({ theme }) {
            const canvasRef = useRef(null);
            const pointerRef = useRef({ x: 0, y: 0, active: false });

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return undefined;
                const ctx = canvas.getContext('2d');
                let raf = null;
                let width = 0;
                let height = 0;
                let dpr = Math.min(window.devicePixelRatio || 1, 2);
                const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const nodeCount = prefersReducedMotion ? 32 : 58;
                const nodes = [];

                const resize = () => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    dpr = Math.min(window.devicePixelRatio || 1, 2);
                    canvas.width = Math.floor(width * dpr);
                    canvas.height = Math.floor(height * dpr);
                    canvas.style.width = `${width}px`;
                    canvas.style.height = `${height}px`;
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    if (!nodes.length) {
                        for (let i = 0; i < nodeCount; i += 1) {
                            nodes.push({
                                x: Math.random() * width,
                                y: Math.random() * height,
                                vx: (Math.random() - 0.5) * 0.18,
                                vy: (Math.random() - 0.5) * 0.18,
                                r: 1 + Math.random() * 1.8,
                                phase: Math.random() * Math.PI * 2
                            });
                        }
                    }
                };

                const draw = (time) => {
                    const dark = document.documentElement.classList.contains('dark');
                    ctx.clearRect(0, 0, width, height);
                    ctx.fillStyle = dark ? 'rgba(2, 6, 23, 0.10)' : 'rgba(248, 250, 252, 0.08)';
                    ctx.fillRect(0, 0, width, height);

                    nodes.forEach((node) => {
                        if (!prefersReducedMotion) {
                            node.x += node.vx;
                            node.y += node.vy;
                            node.x += Math.cos(time * 0.00018 + node.phase) * 0.05;
                            node.y += Math.sin(time * 0.00015 + node.phase) * 0.05;
                        }
                        if (node.x < -20) node.x = width + 20;
                        if (node.x > width + 20) node.x = -20;
                        if (node.y < -20) node.y = height + 20;
                        if (node.y > height + 20) node.y = -20;
                    });

                    const maxDist = Math.min(170, Math.max(95, width * 0.12));
                    for (let i = 0; i < nodes.length; i += 1) {
                        for (let j = i + 1; j < nodes.length; j += 1) {
                            const a = nodes[i];
                            const b = nodes[j];
                            const dx = a.x - b.x;
                            const dy = a.y - b.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < maxDist) {
                                const alpha = (1 - dist / maxDist) * (dark ? 0.18 : 0.14);
                                ctx.strokeStyle = dark ? `rgba(148, 163, 184, ${alpha})` : `rgba(71, 85, 105, ${alpha})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(a.x, a.y);
                                ctx.lineTo(b.x, b.y);
                                ctx.stroke();
                            }
                        }
                    }

                    const pointer = pointerRef.current;
                    if (pointer.active) {
                        nodes.forEach((node) => {
                            const dx = node.x - pointer.x;
                            const dy = node.y - pointer.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 210) {
                                const alpha = (1 - dist / 210) * 0.45;
                                ctx.strokeStyle = `rgba(245, 158, 11, ${alpha})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(pointer.x, pointer.y);
                                ctx.lineTo(node.x, node.y);
                                ctx.stroke();
                            }
                        });
                    }

                    nodes.forEach((node, i) => {
                        const pulse = prefersReducedMotion ? 0.6 : 0.55 + Math.sin(time * 0.001 + node.phase) * 0.25;
                        const isAccent = i % 9 === 0;
                        ctx.fillStyle = isAccent
                            ? `rgba(245, 158, 11, ${0.35 + pulse * 0.28})`
                            : (dark ? `rgba(148, 163, 184, ${0.18 + pulse * 0.16})` : `rgba(71, 85, 105, ${0.14 + pulse * 0.14})`);
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, node.r + (isAccent ? 0.9 : 0), 0, Math.PI * 2);
                        ctx.fill();
                    });

                    raf = requestAnimationFrame(draw);
                };

                const onPointerMove = (event) => {
                    pointerRef.current = { x: event.clientX, y: event.clientY, active: true };
                };
                const onPointerLeave = () => {
                    pointerRef.current.active = false;
                };

                resize();
                window.addEventListener('resize', resize);
                window.addEventListener('pointermove', onPointerMove, { passive: true });
                window.addEventListener('pointerleave', onPointerLeave, { passive: true });
                raf = requestAnimationFrame(draw);

                return () => {
                    if (raf) cancelAnimationFrame(raf);
                    window.removeEventListener('resize', resize);
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerleave', onPointerLeave);
                };
            }, [theme]);

            return <canvas ref={canvasRef} className="canvas-bg" aria-hidden="true" />;
        }

                <div className={`welcome-layer ${exiting ? 'welcome-layer-exit' : ''}`} role="status" aria-live="polite" aria-label="Welcome layer">

                            </div>
                        </div>

                        <div className="welcome-yard" aria-hidden="true">
                            <svg className="welcome-pipeline" viewBox="0 0 900 420" preserveAspectRatio="none">
                                <path className="welcome-pipeline-path" d="M24 270 C170 160 232 342 365 220 S590 120 870 260" fill="none" stroke="rgba(245,158,11,0.55)" strokeWidth="6" strokeLinecap="round" />
                                <path className="welcome-pipeline-path" d="M52 332 C230 284 260 78 410 132 S610 304 840 88" fill="none" stroke="rgba(56,189,248,0.28)" strokeWidth="4" strokeLinecap="round" />
                                <circle cx="365" cy="220" r="9" fill="#f59e0b" />
                                <circle cx="610" cy="304" r="7" fill="#38bdf8" opacity="0.76" />
                                <circle cx="840" cy="88" r="6" fill="#f59e0b" opacity="0.82" />
                            </svg>

                            <svg className="welcome-crane" viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path d="M34 238h162M74 238V42M42 42h238L74 112h206" stroke="currentColor" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" opacity="0.75" />
                                <path d="M120 42 196 238M74 112l122 126" stroke="currentColor" strokeWidth="4" strokeLinecap="round" opacity="0.4" />
                                <g className="welcome-crane-hook">
                                    <path d="M280 42v112" stroke="currentColor" strokeWidth="5" strokeLinecap="round" />
                                    <path d="M260 170h40l-7 38h-26l-7-38Z" fill="currentColor" opacity="0.18" stroke="currentColor" strokeWidth="5" strokeLinejoin="round" />
                                </g>
                            </svg>

                            <div className="welcome-machine welcome-machine-a">
                                <WelcomeGearIcon className="welcome-gear" size={72} />
                                <span className="welcome-machine-label">Forge</span>
                            </div>
                            <div className="welcome-machine welcome-machine-b">
                                <div className="relative flex items-center gap-0">
                                    <WelcomeGearIcon className="welcome-gear" size={58} />
                                    <WelcomeGearIcon className="welcome-gear welcome-gear-reverse -ml-3" size={46} />
                                </div>
                                <span className="welcome-machine-label">Engine</span>
                            </div>
                            <div className="welcome-machine welcome-machine-c">
                                <WelcomeGearIcon className="welcome-gear welcome-gear-reverse" size={58} />
                                <span className="welcome-machine-label">APS</span>
                            </div>

                            <div className="welcome-runner-pack">
                                <div className="welcome-runner-figure" style={{ '--runner-phase': '-0.08s', '--runner-scale': 1 }}>
                                    <WelcomeWorkerIcon />
                                </div>
                            </div>
                            <div className="welcome-runner-pack welcome-runner-pack-secondary">
                                <div className="welcome-runner-figure" style={{ '--runner-phase': '-0.42s', '--runner-scale': 0.9 }}>
                                    <WelcomeWorkerIcon />
                                </div>
                            </div>
                            <div className="welcome-belt"></div>
                        </div>

                        <div className="welcome-progress">
                            <div className="min-w-0">
                                <div className="mb-2 flex items-center justify-between gap-3">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">{welcome.loading}</span>
                                    <span className="text-[10px] font-mono font-bold text-brand-gold">READY</span>
                                </div>
                                <div className="h-2 overflow-hidden rounded-full bg-slate-200/80 dark:bg-slate-800">
                                    <div className="welcome-progress-fill h-full w-full rounded-full bg-gradient-to-r from-brand-gold via-amber-300 to-brand-dark"></div>
                                </div>
                            </div>
                            <button
                                type="button"
                                onClick={onOpen}
                                className="welcome-open-button inline-flex items-center justify-center gap-2 rounded-xl bg-brand-gold px-6 text-sm font-bold text-white shadow-lg shadow-brand-gold/25 transition-all hover:bg-amber-600 hover:shadow-brand-gold/40 active:scale-95"

        function Hero({ content, activeStage, setActiveStage }) {
            return (
                <main className="site-main relative z-10">

                        <div className="hero-copy lg:col-span-7">
                            <p className="hero-eyebrow eyebrow text-[10px] font-bold uppercase text-brand-gold">{content.hero.eyebrow}</p>
                            <h1 className="hero-title font-black leading-[0.95] tracking-tight text-slate-950 dark:text-white">
                                {content.hero.headline}
                            </h1>
                            <p className="hero-subhead opus-sheen max-w-3xl font-black leading-tight tracking-tight">
                                {content.hero.subhead}
                            </p>
                            <p className="hero-body max-w-2xl text-base leading-relaxed text-slate-600 dark:text-slate-300 md:text-lg">
                                {content.hero.body}
                            </p>

                            <div className="hero-actions flex flex-col gap-3 sm:flex-row sm:items-center">
                                <a href={`mailto:hello@operartis.io?subject=${encodeURIComponent(content.hero.mailSubject)}`} className="inline-flex min-h-12 items-center justify-center gap-2 rounded-xl bg-brand-gold px-5 text-sm font-bold text-white shadow-lg shadow-brand-gold/20 transition-all hover:bg-amber-600 hover:shadow-brand-gold/40 active:scale-95">
                                    {content.hero.primary}
                                    <ArrowRightIcon />
                                </a>
                            </div>

                            <div className="hero-domain-pill inline-flex max-w-full items-center gap-3 rounded-full border border-white/50 bg-white/35 px-5 py-2.5 shadow-[inset_0_1px_0_rgba(255,255,255,0.22)] glass-panel dark:border-white/10 dark:bg-slate-950/35">
                                <span className="hero-domain-dot h-2.5 w-2.5 shrink-0 rounded-full bg-brand-gold"></span>
                                <span className="hero-domain-name truncate font-mono text-[10px] font-black uppercase tracking-widest">{content.hero.domain}</span>
                                <span className="hidden h-4 w-px bg-slate-200 dark:bg-slate-700 sm:block"></span>
                                <span className="hero-domain-slogan hidden text-[10px] font-black italic sm:inline">{content.hero.slogan1} {content.hero.slogan2}</span>

        function Footer({ content }) {
            return (
                <footer className="site-footer border-t border-white/50 bg-white/35 py-2 glass-panel dark:border-white/10 dark:bg-brand-obsidian/45">
                    <div className="mx-auto flex w-full max-w-7xl flex-col items-center justify-between gap-2 px-4 text-center sm:px-6 md:flex-row md:px-10 md:text-left">
                        <p className="text-[10px] text-slate-500 dark:text-slate-400">© {new Date().getFullYear()} Operartis Analytics. {content.footer.rights}</p>
                        <div className="flex items-center gap-2 text-[10px] font-mono font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                            <span>{content.footer.version}</span>
                        </div>
                    </div>
                </footer>
            );
        }

        function App() {
            const [theme, setTheme] = useState(() => window.getOperartisTheme ? window.getOperartisTheme() : 'system');
            const [lang, setLang] = useState(() => window.getOperartisLang ? window.getOperartisLang() : 'vi');
            const [activeStage, setActiveStage] = useState(0);
            const [welcomeVisible, setWelcomeVisible] = useState(true);
            const [welcomeExiting, setWelcomeExiting] = useState(false);
            const content = TRANSLATIONS[lang] || TRANSLATIONS.vi;

            useEffect(() => {
                const applyTheme = () => {
                    if (window.applyOperartisThemeClass) window.applyOperartisThemeClass(theme);
                    if (window.persistOperartisTheme) window.persistOperartisTheme(theme);
                };
                applyTheme();
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleSystemChange = () => {
                    if (theme === 'system') applyTheme();
                };
                mediaQuery.addEventListener('change', handleSystemChange);
                return () => mediaQuery.removeEventListener('change', handleSystemChange);
            }, [theme]);

            useEffect(() => {
                if (window.persistOperartisLang) window.persistOperartisLang(lang);
                document.documentElement.lang = lang;
            }, [lang]);

            useEffect(() => {
                const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                if (prefersReducedMotion) return undefined;
                const timer = setInterval(() => {
                    setActiveStage((prev) => (prev + 1) % content.stages.length);
                }, 2600);
                return () => clearInterval(timer);
            }, [content]);

            const toggleTheme = useCallback(() => {
                setTheme((prev) => prev === 'system' ? 'light' : prev === 'light' ? 'dark' : 'system');
            }, []);

            const toggleLang = useCallback(() => {
                setLang((prev) => {
                    const idx = LANG_SEQUENCE.indexOf(prev);
                    return LANG_SEQUENCE[(idx + 1 + LANG_SEQUENCE.length) % LANG_SEQUENCE.length];
                });
            }, []);

            const handleWelcomeOpen = useCallback(() => {
                setWelcomeExiting(true);
                window.setTimeout(() => setWelcomeVisible(false), 650);
            }, []);

            return (
                <div className="site-shell relative text-slate-800 dark:text-slate-100">
                    <CanvasBackground theme={theme} />
                    <div className="quiet-grid pointer-events-none fixed inset-0 z-[1]" aria-hidden="true"></div>
                    <Header content={content} theme={theme} onTheme={toggleTheme} lang={lang} onLang={toggleLang} />
                    <Hero
                        content={content}
                        activeStage={activeStage}
                        setActiveStage={setActiveStage}
                    />
                    <Footer content={content} />
                    {welcomeVisible && <WelcomeLayer content={content} exiting={welcomeExiting} onOpen={handleWelcomeOpen} />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
